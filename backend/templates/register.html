{% extends "base.html" %}

{% block styles %}
<style>
    body {
        background: linear-gradient(135deg, rgba(0,0,0,0.8), rgba(0,0,0,0.6)), 
                    url('/static/images/farm-bg.png') no-repeat center center fixed;
        background-size: cover;
        min-height: 100vh;
    }
    .card {
        background: rgba(255, 255, 255, 0.9);
        backdrop-filter: blur(10px);
    }
</style>
{% endblock %}

{% block content %}
<div class="container">
    <div class="row min-vh-100 justify-content-center align-items-center py-5">
        <div class="col-11 col-sm-10 col-md-8 col-lg-5">
            <div class="card shadow-lg border-0 rounded-4">
                <div class="pt-4 ps-4">
                    <a href="{{ url_for('index') }}" class="btn btn-outline-success btn-sm fw-semibold">
                        <i class="bi bi-arrow-left"></i> Geri
                    </a>
                </div>
                <div class="card-body px-4 px-md-5 py-3">
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill text-success" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold text-success mt-2">Kayıt Ol</h2>
                        <p class="text-muted small">AgroLog ailesine katılarak tarlanı akıllandır.</p>
                    </div>
                    
                    <div id="error-message" class="alert" style="display: none;"></div>
                    <form action="/api/auth/register" method="POST">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <div class="form-floating">
                                    <input type="text" name="firstName" class="form-control" id="firstName" placeholder="Ad" required>
                                    <label for="firstName">Adınız</label>
                                </div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <div class="form-floating">
                                    <input type="text" name="lastName" class="form-control" id="lastName" placeholder="Soyad" required>
                                    <label for="lastName">Soyadınız</label>
                                </div>
                            </div>
                        </div>
                        
                        <div class="form-floating mb-3">
                            <input type="email" name="email" class="form-control" id="email" placeholder="E-posta" required>
                            <label for="email">E-posta Adresi</label>
                        </div>
                        
                        <div class="form-floating mb-3">
                            <input type="password" name="password" class="form-control" id="password" placeholder="Şifre" required>
                            <label for="password">Şifre</label>
                        </div>

                        <div class="d-grid my-4">
                            <button type="submit" class="btn btn-success btn-lg shadow-sm">Hesap Oluştur</button>
                        </div>
                    </form>
                    
                    <div class="text-center mb-3">
                        <p class="text-muted small">Zaten hesabınız var mı? 
                            <a href="/login" class="text-success fw-bold text-decoration-none">Giriş Yap</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    (function() {
        if (localStorage.getItem("access_token")) {
            window.location.href = "/dashboard";
        }
    })();

    $(document).ready(function() {
        $('form').on('submit', function(e) {
            e.preventDefault();

            const formData = $(this).serialize();

            $.ajax({
                url: '/api/auth/register',
                method: 'POST',
                data: formData,
                success: function(response) {
                    $('#error-message')
                        .text("Kayıt Başarılı! Yönlendiriliyorsunuz...")
                        .removeClass('alert-danger')
                        .addClass('alert-success')
                        .fadeIn();
                        
                    setTimeout(function() {
                        window.location.href = "/login";
                    }, 1500);
                },
                error: function(xhr) {
                    const error_message = xhr.responseJSON ? xhr.responseJSON.detail : "Bir hata oluştu.";
                    $('#error-message')
                        .text(error_message)
                        .removeClass('alert-success')
                        .addClass('alert-danger').
                        fadeIn();
                }
            })
        })
    })

</script>

{% endblock %}
