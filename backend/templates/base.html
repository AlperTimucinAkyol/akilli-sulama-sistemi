<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title if title else "AgroLog - Akıllı Tarım" }}</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="{{ url_for('static', path='/css/site.css') }}">
    
    {% block styles %}{% endblock %}

    <style>
        body { font-family: 'Inter', sans-serif; display: flex; flex-direction: column; min-height: 100vh; }
        .main-wrapper { flex: 1; } /* Footer'ı hep aşağıda tutmak için */
        .navbar-brand { font-weight: 700; color: #198754; }
    </style>
</head>
<body>
    {% if not hide_nav %}
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand text-success fw-bold" href="/">
                <i class="bi bi-moisture me-2"></i>AgroLog
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link btn btn-outline-success ms-lg-3" href="/login">Giriş Yap</a></li>
                </ul>
            </div>
        </div>
    </nav>
    {% endif %}

    <div class="main-wrapper">
        {% block content %}{% endblock %}
    </div>
    
    {% if not hide_nav %}
    <footer class="footer border-0 bg-dark text-white py-2">
        <div class="container text-white-50 text-center">
            <div class="row">
                <div class="col-md-6 text-md-start">
                    &copy; 2026 - <span class="text-success fw-bold">AgroLog</span> | Akıllı Tarım Çözümleri
                </div>
                <div class="col-md-6 text-md-end">
                    <a href="#" class="text-white-50 text-decoration-none me-3">Gizlilik</a>
                    <a href="#" class="text-white-50 text-decoration-none">Destek</a>
                </div>
            </div>
        </div>
    </footer>
    {% endif %}
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
